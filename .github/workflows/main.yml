name: build

on: [push, pull_request]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      matrix:
        go-version: ['oldstable', 'stable']
        haxe-version: [latest]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # setup repo
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      # setup go
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      # setup haxe
      - uses: krdlab/setup-haxe@v2.0.2
        with:
          haxe-version: ${{ matrix.haxe-version }}
      - name: Haxe version
        run: haxe --version
      # Get the cores 
      - name: Get number of cores (Ubuntu)
        if: startsWith(runner.os, 'Linux')
        run: echo "CORES=$(nproc --all)" >> $GITHUB_ENV
      - name: Get number of cores (macOS)
        if: startsWith(runner.os, 'macOS')
        run: echo "CORES=$(sysctl -n hw.logicalcpu)" >> $GITHUB_ENV
      - name: Setup hx2go dev
        run: haxelib dev hx2go .
      - name: go work use
        run: go work use
      - name: Run testbed
        run: haxe Testbed.hxml
      - name: Run tests
        run: haxe Tests.hxml